<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Handover Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:focus-within {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-xl mx-auto px-4 py-8 md:py-12">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Handover Assistant</h1>
            <p class="text-slate-500 mt-2">Yesterday's Cash Reconciliation Tool</p>
        </header>

        <main class="space-y-6">
            
            <!-- Section 1: Core Details -->
            <section class="card bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-4 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <h2 class="font-bold text-lg">Handover & Invoice</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Total Handover Cash (Physical)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-medium">₹</span>
                            <input type="number" id="handoverCash" placeholder="0.00" class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-lg font-semibold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Invoice Number</label>
                            <input type="text" id="invoiceNo" placeholder="INV-001" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Invoice Time (24h)</label>
                            <input type="time" id="invoiceTime" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Section 2: Calculation Section -->
            <section class="card bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 mb-4 text-emerald-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                    <h2 class="font-bold text-lg">Sales Reconciliation</h2>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">
                            Total Amount (Till <span id="labelInvoiceNo" class="text-blue-600 font-bold">Inv. No</span>)
                        </label>
                        <input type="number" id="totalAmountTillInv" placeholder="0.00" class="calc-input w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-red-600 mb-1">
                                Sales Return (- <span class="labelTime text-slate-400 font-normal"></span>)
                            </label>
                            <input type="number" id="salesReturn" placeholder="Subtract amount" class="calc-input w-full px-4 py-3 bg-red-50 border border-red-100 rounded-xl focus:ring-2 focus:ring-red-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-emerald-600 mb-1">
                                DSO Received (+ <span class="labelTime text-slate-400 font-normal"></span>)
                            </label>
                            <input type="number" id="dsoReceived" placeholder="Add amount" class="calc-input w-full px-4 py-3 bg-emerald-50 border border-emerald-100 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-indigo-600 mb-1">
                            Coupon/memberships count (+ <span class="labelTime text-slate-400 font-normal"></span>)
                        </label>
                        <div class="relative">
                            <input type="number" id="couponCount" placeholder="Enter quantity" class="calc-input w-full px-4 py-3 bg-indigo-50 border border-indigo-100 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-indigo-400 pointer-events-none">
                                x ₹99
                            </div>
                        </div>
                        <p id="couponCalcPreview" class="text-[10px] mt-1 text-slate-400 italic px-1">Total added: ₹0.00</p>
                    </div>
                </div>
            </section>

            <!-- Results Section -->
            <section id="resultCard" class="bg-slate-800 text-white p-8 rounded-2xl shadow-xl transition-all">
                <div class="flex flex-col items-center justify-center text-center">
                    <div class="grid grid-cols-2 w-full gap-4 mb-6 pb-6 border-b border-slate-700">
                        <div>
                            <p class="text-xs uppercase tracking-widest text-slate-400 mb-1">Calculated Total</p>
                            <p id="finalCalculated" class="text-xl font-bold">₹0.00</p>
                        </div>
                        <div>
                            <p class="text-xs uppercase tracking-widest text-slate-400 mb-1">Handover Cash</p>
                            <p id="finalHandover" class="text-xl font-bold">₹0.00</p>
                        </div>
                    </div>

                    <p class="text-sm text-slate-400 mb-1">Difference Analysis</p>
                    <h3 id="diffValue" class="text-4xl font-black mb-2">₹0.00</h3>
                    <p id="statusText" class="px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-slate-700 text-slate-300">
                        No Data Entered
                    </p>
                </div>
            </section>

            <button onclick="resetForm()" class="w-full py-4 text-slate-400 hover:text-slate-600 transition-colors font-medium flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                Clear all fields
            </button>
        </main>
        
        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>© <span id="year"></span> Cash Handover Calculator • Mobile Friendly</p>
        </footer>
    </div>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const inputs = document.querySelectorAll('input');
        const invoiceNoInput = document.getElementById('invoiceNo');
        const invoiceTimeInput = document.getElementById('invoiceTime');
        const handoverInput = document.getElementById('handoverCash');
        const amountTillInvInput = document.getElementById('totalAmountTillInv');
        const salesReturnInput = document.getElementById('salesReturn');
        const dsoInput = document.getElementById('dsoReceived');
        const couponInput = document.getElementById('couponCount');
        const couponPreview = document.getElementById('couponCalcPreview');

        const labelInvoiceNo = document.getElementById('labelInvoiceNo');
        const labelTimeSpans = document.querySelectorAll('.labelTime');

        const finalCalculatedDisplay = document.getElementById('finalCalculated');
        const finalHandoverDisplay = document.getElementById('finalHandover');
        const diffValueDisplay = document.getElementById('diffValue');
        const statusText = document.getElementById('statusText');
        const resultCard = document.getElementById('resultCard');

        function updateLabels() {
            // Update Invoice Number label
            const invNo = invoiceNoInput.value.trim();
            labelInvoiceNo.textContent = invNo || "Inv. No";
            
            // Update Time labels in 24-hour format
            const timeVal = invoiceTimeInput.value;
            let formattedTime = "";
            if (timeVal) {
                // Keeping it as 24-hour format (HH:mm) as requested
                formattedTime = `till ${timeVal}`;
            }
            
            labelTimeSpans.forEach(span => {
                span.textContent = formattedTime;
            });
        }

        function calculate() {
            updateLabels();

            const handover = parseFloat(handoverInput.value) || 0;
            const baseAmount = parseFloat(amountTillInvInput.value) || 0;
            const returns = parseFloat(salesReturnInput.value) || 0;
            const dso = parseFloat(dsoInput.value) || 0;
            
            // Membership count multiplied by 99
            const count = parseInt(couponInput.value) || 0;
            const couponTotal = count * 99;
            
            // Update preview text
            couponPreview.textContent = `Total added: ₹${couponTotal.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;

            // Logic: (Total Amount till inv - sales return) + DSO + (Count * 99)
            const systemTotal = (baseAmount - returns) + dso + couponTotal;
            const diff = handover - systemTotal;

            // Update displays
            finalCalculatedDisplay.textContent = `₹${systemTotal.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            finalHandoverDisplay.textContent = `₹${handover.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            diffValueDisplay.textContent = `${diff >= 0 ? '' : '-'}₹${Math.abs(diff).toLocaleString('en-IN', {minimumFractionDigits: 2})}`;

            updateVisuals(diff, handover === 0 && baseAmount === 0);
        }

        function updateVisuals(diff, isEmpty) {
            if (isEmpty) {
                statusText.textContent = "No Data Entered";
                statusText.className = "px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-slate-700 text-slate-300";
                resultCard.className = "bg-slate-800 text-white p-8 rounded-2xl shadow-xl transition-all";
                return;
            }

            if (Math.abs(diff) < 0.01) {
                statusText.textContent = "Perfect Match";
                statusText.className = "px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-emerald-500/20 text-emerald-400";
                resultCard.className = "bg-emerald-900 text-white p-8 rounded-2xl shadow-xl border-4 border-emerald-500 transition-all";
            } else if (diff > 0) {
                statusText.textContent = "Cash Overage (Extra)";
                statusText.className = "px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-blue-500/20 text-blue-400";
                resultCard.className = "bg-slate-800 text-white p-8 rounded-2xl shadow-xl transition-all";
            } else {
                statusText.textContent = "Cash Shortage (Missing)";
                statusText.className = "px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest bg-red-500/20 text-red-400";
                resultCard.className = "bg-red-950 text-white p-8 rounded-2xl shadow-xl border-4 border-red-600 transition-all";
            }
        }

        function resetForm() {
            inputs.forEach(input => input.value = '');
            couponPreview.textContent = "Total added: ₹0.00";
            calculate();
        }

        inputs.forEach(input => {
            input.addEventListener('input', calculate);
        });

        // Initialize
        calculate();
    </script>
</body>
</html>
